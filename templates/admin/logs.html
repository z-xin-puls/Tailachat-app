<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泰拉通讯 - 日志管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e5e7eb; font-family: Segoe UI, 微软雅黑; min-height: 100vh; }
        a { text-decoration: none; color: #FF5555; }
        
        .topbar {
            background: rgba(26, 16, 37, 0.7);
            border-bottom: 1px solid rgba(255, 85, 85, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .title { color: #FF5555; font-size: 20px; font-weight: 900; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 { color: #fff; font-size: 28px; font-weight: 700; }
        
        .nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background: rgba(26, 16, 37, 0.6);
            color: #e5e7eb;
            border: 1px solid rgba(255, 85, 85, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover { background: rgba(255, 85, 85, 0.2); border-color: rgba(255, 85, 85, 0.5); }
        .nav-btn.active { background: rgba(255, 85, 85, 0.3); color: #FF5555; border-color: rgba(255, 85, 85, 0.5); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease;
        }
        
        .stat-card:hover { transform: translateY(-2px); }
        
        .stat-label { color: #9ca3af; font-size: 13px; margin-bottom: 8px; }
        .stat-value { color: #fff; font-size: 36px; font-weight: 700; }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        
        .filter-section {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        .filter-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        
        .filter-group label {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .filter-group input,
        .filter-group select {
            padding: 10px 16px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: rgba(255, 85, 85, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 85, 85, 0.1);
        }
        
        .filter-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: rgba(255, 85, 85, 0.3);
            color: #FF5555;
            border: 1px solid rgba(255, 85, 85, 0.4);
        }
        
        .btn-primary:hover {
            background: rgba(255, 85, 85, 0.5);
            border-color: rgba(255, 85, 85, 0.6);
        }
        
        .btn-secondary {
            background: rgba(107, 114, 128, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(156, 163, 175, 0.4);
        }
        
        .btn-secondary:hover {
            background: rgba(107, 114, 128, 0.3);
            border-color: rgba(156, 163, 175, 0.5);
        }
        
        .table-container {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #111827;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #111827; }
        
        .log-id {
            font-family: 'Courier New', monospace;
            color: #6b7280;
            font-weight: 600;
        }
        
        .log-username {
            font-weight: 600;
            color: #fff;
        }
        
        .log-action {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .action-login { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.4); }
        .action-logout { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .action-create { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); }
        .action-delete { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); }
        .action-update { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; border: 1px solid rgba(139, 92, 246, 0.4); }
        .action-ban { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .action-unban { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); }
        .action-default { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(156, 163, 175, 0.4); }
        
        .log-time {
            color: #6b7280;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }
        
        .log-detail {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #9ca3af;
            font-size: 13px;
            cursor: pointer;
        }
        
        .log-detail:hover {
            color: #e5e7eb;
            white-space: normal;
            word-wrap: break-word;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
        }
        
        .page-btn {
            padding: 8px 15px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            color: #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 14px;
        }
        
        .page-btn:hover:not(:disabled) {
            background: rgba(255, 85, 85, 0.2);
            border-color: rgba(255, 85, 85, 0.5);
        }
        
        .page-btn.active {
            background: rgba(255, 85, 85, 0.3);
            color: #FF5555;
            border-color: rgba(255, 85, 85, 0.5);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            color: #9ca3af;
            font-weight: 600;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #9ca3af;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            table {
                min-width: 800px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">📋 日志管理</div>
        <a href="/admin" style="color: #9ca3af; font-size: 14px;">← 返回面板</a>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>📋 系统日志</h1>
        </div>
        
        <div class="nav" style="margin-bottom: 24px;">
            <button class="nav-btn" onclick="window.location.href='/admin'">概览</button>
            <button class="nav-btn" onclick="window.location.href='/admin/users'">用户管理</button>
            <button class="nav-btn active">日志管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/rooms'">房间管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/fortresses'">据点管理</button>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <!-- 统计数据将通过JavaScript动态加载 -->
        </div>
        
        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-title">🔍 筛选条件</div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="输入用户名搜索">
                </div>
                
                <div class="filter-group">
                    <label for="actionType">操作类型</label>
                    <select id="actionType">
                        <option value="">全部类型</option>
                        <option value="login">登录</option>
                        <option value="logout">登出</option>
                        <option value="create">创建</option>
                        <option value="delete">删除</option>
                        <option value="update">更新</option>
                        <option value="ban">封禁</option>
                        <option value="unban">解封</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="startDate">开始日期</label>
                    <input type="date" id="startDate">
                </div>
                
                <div class="filter-group">
                    <label for="endDate">结束日期</label>
                    <input type="date" id="endDate">
                </div>
            </div>
            
            <div class="filter-buttons">
                <button class="btn btn-primary" onclick="searchLogs()">🔍 搜索</button>
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 重置</button>
                <button class="btn btn-secondary" onclick="refreshStats()">📊 刷新统计</button>
            </div>
        </div>
        
        <!-- 日志表格 -->
        <div class="table-container">
            <div id="loadingMessage" class="loading">正在加载日志数据...</div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <table id="logsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>操作类型</th>
                        <th>IP地址</th>
                        <th>时间</th>
                        <th>详细信息</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <!-- 日志数据将通过JavaScript动态加载 -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <h3>暂无日志数据</h3>
                <p>没有找到符合筛选条件的日志记录</p>
            </div>
        </div>
        
        <!-- 分页 -->
        <div class="pagination" id="pagination" style="display: none;">
            <!-- 分页按钮将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {};
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadLogs();
        });
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/admin/api/logs/statistics');
                const data = await response.json();
                
                if (data.success) {
                    renderStats(data);
                } else {
                    console.error('加载统计数据失败:', data.error);
                }
            } catch (error) {
                console.error('加载统计数据出错:', error);
            }
        }
        
        // 渲染统计数据
        function renderStats(data) {
            const statsGrid = document.getElementById('statsGrid');
            
            // 计算总数
            const totalLogs = data.action_stats.reduce((sum, stat) => sum + stat.count, 0);
            const todayLogs = data.daily_stats.length > 0 ? data.daily_stats[0].count : 0;
            const activeUsers = data.user_stats.length;
            const topAction = data.action_stats.length > 0 ? data.action_stats[0] : null;
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>总日志数</h3>
                    <div class="stat-value">${totalLogs.toLocaleString()}</div>
                    <div class="stat-detail">最近7天</div>
                </div>
                <div class="stat-card">
                    <h3>今日日志</h3>
                    <div class="stat-value">${todayLogs.toLocaleString()}</div>
                    <div class="stat-detail">今天产生的日志</div>
                </div>
                <div class="stat-card">
                    <h3>活跃用户</h3>
                    <div class="stat-value">${activeUsers.toLocaleString()}</div>
                    <div class="stat-detail">最近7天活跃</div>
                </div>
                <div class="stat-card">
                    <h3>最频繁操作</h3>
                    <div class="stat-value">${topAction ? topAction.action_type : '-'}</div>
                    <div class="stat-detail">${topAction ? topAction.count.toLocaleString() + ' 次' : '暂无数据'}</div>
                </div>
            `;
        }
        
        // 加载日志数据
        async function loadLogs(page = 1) {
            const loadingMessage = document.getElementById('loadingMessage');
            const errorMessage = document.getElementById('errorMessage');
            const logsTable = document.getElementById('logsTable');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');
            
            // 显示加载状态
            loadingMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            logsTable.style.display = 'none';
            emptyState.style.display = 'none';
            pagination.style.display = 'none';
            
            try {
                // 构建查询参数
                const params = new URLSearchParams({
                    page: page,
                    per_page: 20,
                    ...currentFilters
                });
                
                const response = await fetch(`/admin/api/logs?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    renderLogs(data.logs);
                    renderPagination(data.page, data.total_pages, data.total);
                    currentPage = data.page;
                    totalPages = data.total_pages;
                    
                    // 显示表格
                    loadingMessage.style.display = 'none';
                    logsTable.style.display = 'table';
                    
                    if (data.logs.length === 0) {
                        logsTable.style.display = 'none';
                        emptyState.style.display = 'block';
                    } else {
                        pagination.style.display = 'flex';
                    }
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error('加载日志失败:', error);
                loadingMessage.style.display = 'none';
                errorMessage.textContent = '加载日志失败: ' + error.message;
                errorMessage.style.display = 'block';
            }
        }
        
        // 渲染日志表格
        function renderLogs(logs) {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = '';
            
            logs.forEach(log => {
                const row = document.createElement('tr');
                
                const actionClass = `action-${log.action_type || 'default'}`;
                const actionText = log.action_type || '未知';
                const detailText = log.action_detail ? 
                    (typeof log.action_detail === 'object' ? 
                        JSON.stringify(log.action_detail) : 
                        log.action_detail) : '-';
                
                row.innerHTML = `
                    <td class="log-id">#${log.id}</td>
                    <td class="log-username">${log.username || '-'}</td>
                    <td><span class="log-action ${actionClass}">${actionText}</span></td>
                    <td>${log.ip_address || '-'}</td>
                    <td class="log-time">${formatDateTime(log.created_at)}</td>
                    <td><div class="log-detail" title="${detailText}">${detailText}</div></td>
                `;
                
                tbody.appendChild(row);
            });
        }
        
        // 渲染分页
        function renderPagination(currentPage, totalPages, totalItems) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => loadLogs(currentPage - 1);
            pagination.appendChild(prevBtn);
            
            // 页码按钮
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => loadLogs(i);
                pagination.appendChild(pageBtn);
            }
            
            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => loadLogs(currentPage + 1);
            pagination.appendChild(nextBtn);
            
            // 页面信息
            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.textContent = `第 ${currentPage} 页，共 ${totalPages} 页 (${totalItems} 条记录)`;
            pagination.appendChild(pageInfo);
        }
        
        // 搜索日志
        function searchLogs() {
            // 收集筛选条件
            currentFilters = {
                username: document.getElementById('username').value.trim(),
                action_type: document.getElementById('actionType').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value
            };
            
            // 移除空值
            Object.keys(currentFilters).forEach(key => {
                if (!currentFilters[key]) {
                    delete currentFilters[key];
                }
            });
            
            // 重新加载日志
            loadLogs(1);
        }
        
        // 重置筛选条件
        function resetFilters() {
            document.getElementById('username').value = '';
            document.getElementById('actionType').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            
            currentFilters = {};
            loadLogs(1);
        }
        
        // 刷新统计数据
        function refreshStats() {
            loadStats();
        }
        
        // 格式化日期时间
        function formatDateTime(dateString) {
            if (!dateString) return '-';
            
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter 搜索
            if (e.ctrlKey && e.key === 'Enter') {
                searchLogs();
            }
            // Ctrl+R 重置
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                resetFilters();
            }
        });
    </script>
</body>
</html>
