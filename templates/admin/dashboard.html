<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泰拉通讯 - 管理员面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e5e7eb; font-family: Segoe UI, 微软雅黑; min-height: 100vh; }
        a { text-decoration: none; color: #FF5555; }
        
        .topbar {
            background: rgba(26, 16, 37, 0.7);
            border-bottom: 1px solid rgba(255, 85, 85, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .title { color: #FF5555; font-size: 20px; font-weight: 900; }
        .user-info { color: #9ca3af; font-size: 14px; margin-top: 4px; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .header h1 { color: #fff; font-size: 28px; font-weight: 700; }
        
        .nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background: rgba(26, 16, 37, 0.6);
            color: #e5e7eb;
            border: 1px solid rgba(255, 85, 85, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover { background: rgba(255, 85, 85, 0.2); border-color: rgba(255, 85, 85, 0.5); }
        .nav-btn.active { background: rgba(255, 85, 85, 0.3); color: #FF5555; border-color: rgba(255, 85, 85, 0.5); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }
        
        .stat-label { color: #9ca3af; font-size: 13px; margin-bottom: 8px; }
        .stat-value { color: #fff; font-size: 36px; font-weight: 700; }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        
        .section {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        .section-title { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <div class="title">🔐 管理员面板</div>
            <div class="user-info">系统管理后台</div>
        </div>
        <div>
            <a href="/" style="color: #9ca3af; font-size: 14px;">← 返回地图</a>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>📊 系统概览</h1>
            <div class="nav">
                <button class="nav-btn active">概览</button>
                <button class="nav-btn" onclick="window.location.href='/admin/users'">用户管理</button>
                <button class="nav-btn" onclick="window.location.href='/admin/rooms'">房间管理</button>
                <button class="nav-btn" onclick="window.location.href='/admin/fortresses'">据点管理</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">总用户数</div>
                <div class="stat-value">{{ total_users }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-label">当前在线</div>
                <div class="stat-value">{{ online_users }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">今日活跃</div>
                <div class="stat-value">{{ today_active_users }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏠</div>
                <div class="stat-label">活跃房间</div>
                <div class="stat-value">{{ active_rooms }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">➕</div>
                <div class="stat-label">今日创建房间</div>
                <div class="stat-value">{{ today_created_rooms }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔐</div>
                <div class="stat-label">管理员数</div>
                <div class="stat-value">{{ admin_count }}</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">🚀 快速操作</div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="nav-btn" onclick="window.location.href='/admin/users'">管理用户</button>
                <button class="nav-btn" onclick="window.location.href='/admin/rooms'">管理房间</button>
                <button class="nav-btn" onclick="window.location.href='/admin/fortresses'">管理据点</button>
            </div>
        </div>
    </div>
</body>
</html>
