<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泰拉通讯 - 房间管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e5e7eb; font-family: Segoe UI, 微软雅黑; min-height: 100vh; }
        a { text-decoration: none; color: #FF5555; }
        
        .topbar {
            background: rgba(26, 16, 37, 0.7);
            border-bottom: 1px solid rgba(255, 85, 85, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .title { color: #FF5555; font-size: 20px; font-weight: 900; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 { color: #fff; font-size: 28px; font-weight: 700; }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            padding: 10px 16px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
            width: 300px;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: rgba(255, 85, 85, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 85, 85, 0.1);
        }

        .search-btn {
            padding: 10px 20px;
            background: rgba(255, 85, 85, 0.3);
            color: #FF5555;
            border: 1px solid rgba(255, 85, 85, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: rgba(255, 85, 85, 0.5);
            border-color: rgba(255, 85, 85, 0.6);
        }
        
        .nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background: rgba(26, 16, 37, 0.6);
            color: #e5e7eb;
            border: 1px solid rgba(255, 85, 85, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover { background: rgba(255, 85, 85, 0.2); border-color: rgba(255, 85, 85, 0.5); }
        .nav-btn.active { background: rgba(255, 85, 85, 0.3); color: #FF5555; border-color: rgba(255, 85, 85, 0.5); }
        
        .table-container {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #111827;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #111827; }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-right: 6px;
        }
        
        .btn-delete { background: #ef4444; color: #fff; }
        .action-btn:hover { filter: brightness(1.1); }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: rgba(26, 16, 37, 0.95);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        
        .modal-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            color: #9ca3af;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: rgba(255, 85, 85, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 85, 85, 0.1);
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-cancel {
            background: rgba(107, 114, 128, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(156, 163, 175, 0.4);
        }
        
        .btn-cancel:hover {
            background: rgba(107, 114, 128, 0.3);
            border-color: rgba(156, 163, 175, 0.5);
        }
        
        .btn-save {
            background: rgba(255, 85, 85, 0.3);
            color: #FF5555;
            border: 1px solid rgba(255, 85, 85, 0.4);
        }
        
        .btn-save:hover {
            background: rgba(255, 85, 85, 0.5);
            border-color: rgba(255, 85, 85, 0.6);
        }
        
        .btn-create {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        
        .btn-create:hover {
            background: rgba(16, 185, 129, 0.3);
            border-color: rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">🏠 房间管理</div>
        <a href="/admin" style="color: #9ca3af; font-size: 14px;">← 返回面板</a>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>房间列表</h1>
            <div>
                <button class="nav-btn btn-create" onclick="openRoomModal()">+ 新增房间</button>
            </div>
        </div>
        <div class="search-box" style="margin-bottom: 24px;">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索房间（房间名/ID，支持模糊搜索）" onkeypress="handleSearchKeypress(event)">
            <button class="search-btn" onclick="searchRooms()">搜索</button>
            <button class="search-btn" onclick="resetSearch()">重置</button>
        </div>
        <div class="nav" style="margin-bottom: 24px;">
            <button class="nav-btn" onclick="window.location.href='/admin'">概览</button>
            <button class="nav-btn" onclick="window.location.href='/admin/users'">用户管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/logs'">日志管理</button>
            <button class="nav-btn active">房间管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/fortresses'">据点管理</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>房间名称</th>
                        <th>创建者</th>
                        <th>所属据点</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="roomTable">
                    {% for room in rooms %}
                    <tr>
                        <td>{{ room.id }}</td>
                        <td>{{ room.name }}</td>
                        <td>{{ room.owner }}</td>
                        <td>
                            {% if room.fortress_name %}
                                <span style="color: #10b981;">{{ room.fortress_name }}</span>
                            {% else %}
                                <span style="color: #6b7280;">未关联</span>
                            {% endif %}
                        </td>
                        <td>
                            <button class="action-btn btn-delete" onclick="deleteRoom({{ room.id }}, '{{ room.name }}')">删除</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 新增房间模态框 -->
    <div class="modal" id="roomModal">
        <div class="modal-content">
            <div class="modal-title">新增房间</div>
            <form id="roomForm">
                <div class="form-group">
                    <label class="form-label">房间名称</label>
                    <input type="text" class="form-input" id="newRoomName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">创建者</label>
                    <input type="text" class="form-input" id="newRoomOwner" required>
                </div>
                <div class="form-group">
                    <label class="form-label">所属据点</label>
                    <select class="form-input" id="newRoomFortress">
                        <option value="">请选择据点</option>
                        {% for fortress in fortresses %}
                        <option value="{{ fortress.id }}">{{ fortress.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeRoomModal()">取消</button>
                    <button type="submit" class="modal-btn btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        let allRooms = [];

        // 初始化房间数据
        {% for room in rooms %}
        allRooms.push({
            id: {{ room.id }},
            name: '{{ room.name }}',
            owner: '{{ room.owner }}',
            fortress_name: '{{ room.fortress_name or "" }}'
        });
        {% endfor %}

        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                searchRooms();
            }
        }

        function searchRooms() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!searchTerm) {
                renderRooms(allRooms);
                return;
            }

            const filteredRooms = allRooms.filter(room => {
                // 精确匹配ID
                if (searchTerm === room.id.toString()) {
                    return true;
                }
                // 模糊匹配房间名
                if (room.name.toLowerCase().includes(searchTerm)) {
                    return true;
                }
                return false;
            });

            renderRooms(filteredRooms);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderRooms(allRooms);
        }

        function renderRooms(rooms) {
            const tbody = document.getElementById('roomTable');
            tbody.innerHTML = '';

            if (rooms.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;">未找到匹配的房间</td></tr>';
                return;
            }

            rooms.forEach(room => {
                const row = document.createElement('tr');
                const fortressDisplay = room.fortress_name ? 
                    `<span style="color: #10b981;">${room.fortress_name}</span>` : 
                    '<span style="color: #6b7280;">未关联</span>';
                
                row.innerHTML = `
                    <td>${room.id}</td>
                    <td>${room.name}</td>
                    <td>${room.owner}</td>
                    <td>${fortressDisplay}</td>
                    <td>
                        <button class="action-btn btn-delete" onclick="deleteRoom(${room.id}, '${room.name}')">删除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function deleteRoom(roomId, roomName) {
            if (!confirm(`确定要删除房间 "${roomName}" 吗？此操作不可恢复！`)) {
                return;
            }
            
            try {
                const response = await fetch(`/admin/api/room/${roomId}/delete`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
        
        // 新增房间相关函数
        function openRoomModal() {
            document.getElementById('roomModal').classList.add('show');
            document.getElementById('roomForm').reset();
        }
        
        function closeRoomModal() {
            document.getElementById('roomModal').classList.remove('show');
            document.getElementById('roomForm').reset();
        }
        
        // 处理新增房间表单提交
        document.getElementById('roomForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const roomName = document.getElementById('newRoomName').value.trim();
            const roomOwner = document.getElementById('newRoomOwner').value.trim();
            const fortressId = document.getElementById('newRoomFortress').value;
            
            if (!roomName || !roomOwner) {
                alert('房间名称和创建者不能为空');
                return;
            }
            
            try {
                const response = await fetch('/admin/api/room/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: roomName,
                        owner: roomOwner,
                        fortress_id: fortressId ? parseInt(fortressId) : null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('房间创建成功');
                    closeRoomModal();
                    location.reload(); // 刷新页面以显示新房间
                } else {
                    alert(data.error || '创建房间失败');
                }
            } catch (error) {
                alert('创建房间失败: ' + error.message);
            }
        });
        
        // 点击模态框外部关闭
        document.getElementById('roomModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRoomModal();
            }
        });
    </script>
</body>
</html>
