<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泰拉通讯 - 用户管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e5e7eb; font-family: Segoe UI, 微软雅黑; min-height: 100vh; }
        a { text-decoration: none; color: #FF5555; }
        
        .topbar {
            background: rgba(26, 16, 37, 0.7);
            border-bottom: 1px solid rgba(255, 85, 85, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .title { color: #FF5555; font-size: 20px; font-weight: 900; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 { color: #fff; font-size: 28px; font-weight: 700; }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            padding: 10px 16px;
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
            width: 300px;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: rgba(255, 85, 85, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 85, 85, 0.1);
        }

        .search-btn {
            padding: 10px 20px;
            background: rgba(255, 85, 85, 0.3);
            color: #FF5555;
            border: 1px solid rgba(255, 85, 85, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: rgba(255, 85, 85, 0.5);
            border-color: rgba(255, 85, 85, 0.6);
        }
        
        .nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background: rgba(26, 16, 37, 0.6);
            color: #e5e7eb;
            border: 1px solid rgba(255, 85, 85, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover { background: rgba(255, 85, 85, 0.2); border-color: rgba(255, 85, 85, 0.5); }
        .nav-btn.active { background: rgba(255, 85, 85, 0.3); color: #FF5555; border-color: rgba(255, 85, 85, 0.5); }
        
        .table-container {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #111827;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #111827; }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .role-admin { background: rgba(255, 85, 85, 0.3); color: #FF5555; border: 1px solid rgba(255, 85, 85, 0.5); }
        .role-user { background: rgba(107, 114, 128, 0.2); color: #cbd5e1; border: 1px solid rgba(156, 163, 175, 0.4); }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-right: 6px;
        }
        
        .btn-promote { background: rgba(255, 85, 85, 0.2); color: #FF5555; border: 1px solid rgba(255, 85, 85, 0.4); }
        .btn-demote { background: #f59e0b; color: #111; }
        .btn-delete { background: #ef4444; color: #fff; }
        .btn-reset { background: #3b82f6; color: #fff; }

        .action-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">👥 用户管理</div>
        <a href="/admin" style="color: #9ca3af; font-size: 14px;">← 返回面板</a>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>用户列表</h1>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索用户（昵称/账号/ID）" onkeypress="handleSearchKeypress(event)">
                <button class="search-btn" onclick="searchUsers()">搜索</button>
                <button class="search-btn" onclick="resetSearch()">重置</button>
            </div>
        </div>
        <div class="nav" style="margin-bottom: 24px;">
            <button class="nav-btn" onclick="window.location.href='/admin'">概览</button>
            <button class="nav-btn active">用户管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/rooms'">房间管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/fortresses'">据点管理</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    {% for user in users %}
                    <tr>
                        <td>{{ user.username }}</td>
                        <td>{{ user.nickname or '-' }}</td>
                        <td>
                            <span class="role-badge {{ 'role-admin' if user.role == 'admin' else 'role-user' }}">
                                {{ '管理员' if user.role == 'admin' else '用户' }}
                            </span>
                        </td>
                        <td>
                            {% if user.role == 'user' %}
                            <button class="action-btn btn-promote" onclick="updateRole('{{ user.username }}', 'admin')">设为管理员</button>
                            {% else %}
                            <button class="action-btn btn-demote" onclick="updateRole('{{ user.username }}', 'user')">设为用户</button>
                            {% endif %}
                            <button class="action-btn btn-reset" onclick="resetPassword('{{ user.username }}')">重置密码</button>
                            <button class="action-btn btn-delete" onclick="deleteUser('{{ user.username }}')">删除</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let allUsers = [];

        // 初始化用户数据
        {% for user in users %}
        allUsers.push({
            username: '{{ user.username }}',
            nickname: '{{ user.nickname or "" }}',
            role: '{{ user.role }}',
            id: {{ user.id if user.id else 0 }}
        });
        {% endfor %}

        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                searchUsers();
            }
        }

        function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!searchTerm) {
                renderUsers(allUsers);
                return;
            }

            const filteredUsers = allUsers.filter(user => {
                // 精确匹配ID
                if (searchTerm === user.id.toString()) {
                    return true;
                }
                // 精确匹配用户名
                if (searchTerm === user.username.toLowerCase()) {
                    return true;
                }
                // 模糊匹配昵称
                if (user.nickname && user.nickname.toLowerCase().includes(searchTerm)) {
                    return true;
                }
                return false;
            });

            renderUsers(filteredUsers);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderUsers(allUsers);
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#9ca3af;">未找到匹配的用户</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.username}</td>
                    <td>${user.nickname || '-'}</td>
                    <td>
                        <span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">
                            ${user.role === 'admin' ? '管理员' : '用户'}
                        </span>
                    </td>
                    <td>
                        ${user.role === 'user' ?
                            `<button class="action-btn btn-promote" onclick="updateRole('${user.username}', 'admin')">设为管理员</button>` :
                            `<button class="action-btn btn-demote" onclick="updateRole('${user.username}', 'user')">设为用户</button>`
                        }
                        <button class="action-btn btn-reset" onclick="resetPassword('${user.username}')">重置密码</button>
                        <button class="action-btn btn-delete" onclick="deleteUser('${user.username}')">删除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function updateRole(username, newRole) {
            if (!confirm(`确定要将用户 ${username} 的角色修改为 ${newRole === 'admin' ? '管理员' : '用户'} 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`/admin/api/user/${username}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: newRole })
                });
                const data = await response.json();
                
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
            }
        }
        
        async function deleteUser(username) {
            if (!confirm(`确定要删除用户 ${username} 吗？此操作不可恢复！`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/api/user/${username}/delete`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    location.reload();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        async function resetPassword(username) {
            if (!confirm(`确定要将用户 ${username} 的密码重置为 123456 吗？`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/api/user/${username}/reset_password`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    alert(`用户 ${username} 的密码已重置为 123456`);
                } else {
                    alert(data.error || '重置失败');
                }
            } catch (error) {
                alert('重置失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
