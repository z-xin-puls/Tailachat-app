<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>泰拉通讯 - 据点管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e5e7eb; font-family: Segoe UI, 微软雅黑; min-height: 100vh; }
        a { text-decoration: none; color: #FF5555; }
        
        .topbar {
            background: rgba(26, 16, 37, 0.7);
            border-bottom: 1px solid rgba(255, 85, 85, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .title { color: #FF5555; font-size: 20px; font-weight: 900; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header h1 { color: #fff; font-size: 28px; font-weight: 700; }
        
        .nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background: rgba(26, 16, 37, 0.6);
            color: #e5e7eb;
            border: 1px solid rgba(255, 85, 85, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover { background: rgba(255, 85, 85, 0.2); border-color: rgba(255, 85, 85, 0.5); }
        .nav-btn.active { background: rgba(255, 85, 85, 0.3); color: #FF5555; border-color: rgba(255, 85, 85, 0.5); }
        
        .table-container {
            background: rgba(26, 16, 37, 0.6);
            border: 1px solid rgba(255, 85, 85, 0.3);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #111827;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #111827; }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-right: 6px;
        }
        
        .btn-edit { background: rgba(255, 85, 85, 0.2); color: #FF5555; border: 1px solid rgba(255, 85, 85, 0.4); }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .btn-create { background: rgba(255, 85, 85, 0.2); color: #FF5555; border: 1px solid rgba(255, 85, 85, 0.4); padding: 10px 20px; font-size: 14px; }
        
        .action-btn:hover { filter: brightness(1.1); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
        }
        
        .modal-title { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        
        .form-label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: #111827;
            border: 1px solid #374151;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-input:focus { outline: none; border-color: #2dd4bf; }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-cancel { background: rgba(26, 16, 37, 0.6); color: #e5e7eb; border: 1px solid rgba(255, 85, 85, 0.3); }
        .btn-save { background: rgba(255, 85, 85, 0.3); color: #FF5555; border: 1px solid rgba(255, 85, 85, 0.5); font-weight: 600; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">🏰 据点管理</div>
        <a href="/admin" style="color: #9ca3af; font-size: 14px;">← 返回面板</a>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>据点列表</h1>
            <div>
                <button class="nav-btn btn-create" onclick="openModal()">+ 新增据点</button>
            </div>
        </div>
        
        <div class="nav" style="margin-bottom: 24px;">
            <button class="nav-btn" onclick="window.location.href='/admin'">概览</button>
            <button class="nav-btn" onclick="window.location.href='/admin/users'">用户管理</button>
            <button class="nav-btn" onclick="window.location.href='/admin/rooms'">房间管理</button>
            <button class="nav-btn active">据点管理</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>坐标</th>
                        <th>半径</th>
                        <th>颜色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fortress in fortresses %}
                    <tr>
                        <td>{{ fortress[0] }}</td>
                        <td>{{ fortress[1] }}</td>
                        <td>({{ fortress[2] }}, {{ fortress[3] }})</td>
                        <td>{{ fortress[4] or '-' }}</td>
                        <td>
                            {% if fortress[5] %}
                            <span style="display:inline-block;width:20px;height:20px;background:{{ fortress[5] }};border-radius:4px;border:1px solid #374151;"></span>
                            {% else %}
                            -
                            {% endif %}
                        </td>
                        <td>
                            <button class="action-btn btn-edit" onclick="openModal({{ fortress[0] }}, '{{ fortress[1] }}', {{ fortress[2] }}, {{ fortress[3] }}, {{ fortress[4] or 'null' }}, '{{ fortress[5] or '' }}', '{{ fortress[6] or '' }}', '{{ fortress[7] or '' }}')">编辑</button>
                            <button class="action-btn btn-delete" onclick="deleteFortress({{ fortress[0] }}, '{{ fortress[1] }}')">删除</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="modal" id="fortressModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">新增据点</div>
            <form id="fortressForm">
                <input type="hidden" id="fortressId">
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-input" id="fortressName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">X坐标</label>
                    <input type="number" step="any" class="form-input" id="fortressX" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Y坐标</label>
                    <input type="number" step="any" class="form-input" id="fortressY" required>
                </div>
                <div class="form-group">
                    <label class="form-label">半径</label>
                    <input type="number" step="any" class="form-input" id="fortressRadius">
                </div>
                <div class="form-group">
                    <label class="form-label">颜色</label>
                    <input type="text" class="form-input" id="fortressColor" placeholder="#2dd4bf">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-input" id="fortressDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">图片URL</label>
                    <input type="text" class="form-input" id="fortressImage">
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="modal-btn btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function openModal(id = null, name = '', x = 0, y = 0, radius = null, color = '', description = '', image = '') {
            document.getElementById('modalTitle').textContent = id ? '编辑据点' : '新增据点';
            document.getElementById('fortressId').value = id || '';
            document.getElementById('fortressName').value = name;
            document.getElementById('fortressX').value = x;
            document.getElementById('fortressY').value = y;
            document.getElementById('fortressRadius').value = radius || '';
            document.getElementById('fortressColor').value = color;
            document.getElementById('fortressDescription').value = description;
            document.getElementById('fortressImage').value = image;
            document.getElementById('fortressModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('fortressModal').classList.remove('show');
            document.getElementById('fortressForm').reset();
        }
        
        document.getElementById('fortressForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('fortressId').value;
            const data = {
                name: document.getElementById('fortressName').value,
                x: parseFloat(document.getElementById('fortressX').value),
                y: parseFloat(document.getElementById('fortressY').value),
                radius: document.getElementById('fortressRadius').value ? parseFloat(document.getElementById('fortressRadius').value) : null,
                color: document.getElementById('fortressColor').value,
                description: document.getElementById('fortressDescription').value,
                image: document.getElementById('fortressImage').value
            };
            
            try {
                const url = id ? `/admin/api/fortress/${id}` : '/admin/api/fortress';
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    location.reload();
                } else {
                    alert(result.error || '保存失败');
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        });
        
        async function deleteFortress(id, name) {
            if (!confirm(`确定要删除据点 "${name}" 吗？此操作不可恢复！`)) {
                return;
            }
            
            try {
                const response = await fetch(`/admin/api/fortress/${id}/delete`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
